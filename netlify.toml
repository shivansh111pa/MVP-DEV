[build]
  command = "npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/build"
  functions = "netlify/functions"

[functions]
  node_bundle = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
